# -*- coding: utf-8 -*-
# Headless training configuration

mode: headless

environment:
  character: Ironclad
  max_steps: 500
  verbose: false

model:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  verbose: 1

training:
  total_timesteps: 1000000
  save_freq: 10000
  verbose: 1

paths:
  save_dir: "./models/unified"
  model_name: "ppo_sts2_headless"
